---
- name: Ensure MySQL service is running
  service:
    name: mysqld
    state: started

- name: Copy create database script
  copy:
    src: 01_create_database.sql
    dest: /tmp/01_create_database.sql

- name: Execute create database script
  shell: mysql -u root -proot < /tmp/01_create_database.sql

- name: Copy create tables script
  copy:
    src: 02_create_tables.sql
    dest: /tmp/02_create_tables.sql

- name: Execute create tables script
  shell: mysql -u root -proot < /tmp/02_create_tables.sql

- name: Copy insert data script
  copy:
    src: 03_insert_data.sql
    dest: /tmp/03_insert_data.sql

- name: Execute insert data script
  shell: mysql -u root -proot < /tmp/03_insert_data.sql